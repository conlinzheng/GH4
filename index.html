<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 鞋类产品展示</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">鞋类产品</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
            <div class="language-switcher">
                <button data-lang="zh" class="lang-btn active">中文</button>
                <button data-lang="en" class="lang-btn">English</button>
                <button data-lang="ko" class="lang-btn">한국어</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-slider" id="heroSlider">
            </div>
            <div class="hero-content">
                <h1 id="heroTitle">精选鞋款</h1>
                <p id="heroSubtitle">舒适时尚 品质保证</p>
            </div>
        </section>

        <section class="products-section">
            <h2 id="productsTitle">全部产品</h2>
            <div class="series-filter" id="seriesFilter">
            </div>
            <div class="products-grid" id="productsGrid">
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content" id="footerContent">
            <p>&copy; 2024 鞋类品牌. All rights reserved.</p>
        </div>
    </footer>

    <div class="modal" id="productModal" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-gallery" id="modalGallery"></div>
            <div class="modal-info" id="modalInfo"></div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/cache-manager.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/product-data.js"></script>
    <script src="js/config-manager.js"></script>
    <script src="js/ui-notifier.js"></script>
    <script src="js/image-uploader.js"></script>
    <script src="js/lazy-load.js"></script>
    <script src="js/error-handler.js"></script>
    <script src="js/frontend.js"></script>
</body>
</html>
